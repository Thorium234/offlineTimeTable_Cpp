name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        build-type: [Release, Debug]
      fail-fast: false

    steps:
    - uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          cmake pkg-config \
          qtbase5-dev libqt5printsupport5-dev \
          g++-12 clang-14 clang-tidy-14 \
          python3 python3-pip python3-venv

    - name: Set up Python
      run: |
        python3 -m venv .venv
        source .venv/bin/activate
        pip install flask flask-cors

    - name: Configure (${{ matrix.build-type }})
      run: |
        cmake -S . -B build_cmake \
          -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
          -DENABLE_ASAN=${{ matrix.build-type == 'Debug' && 'ON' || 'OFF' }}

    - name: Build
      run: cmake --build build_cmake -j $(nproc)

    - name: Run unit tests
      run: ./build_cmake/test_runner

    - name: Run clang-tidy (Debug only)
      if: matrix.build-type == 'Debug'
      run: |
        cmake -S . -B build_cmake \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
        find . -name '*.cpp' -path './build_cmake' -prune -o -print | \
          xargs clang-tidy-14 -p build_cmake --warnings-as-errors='*' 2>/dev/null || true

  lint-format:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - name: Check clang-format
      uses: jidicula/clang-format-action@v4.11.0
      with:
        clang-format-version: '16'
        fallback-style: 'WebKit'
